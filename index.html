<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAFRATE — Full Build Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --blue:#1E56B0; --blue-lt:#EAF1FB; --blue-dk:#163D80;
  --gold:#F4A300; --gold-lt:#FFF8E1;
  --red:#C0392B; --red-lt:#FDF0F0;
  --green:#1A7A4A; --green-lt:#F0FAF4;
  --purple:#7D3C98; --purple-lt:#F5EEF8;
  --amber:#B7770D; --amber-lt:#FEF9EC;
  --bg:#F2F5FA; --card:#fff;
  --border:#E2E8F0; --text:#111827; --muted:#6B7280;
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:var(--blue-dk);padding:0 32px;display:flex;align-items:stretch;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:3px solid var(--gold)}
.hdr-left{padding:18px 0;display:flex;flex-direction:column;gap:4px}
.hdr h1{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.hdr-sub{font-family:'DM Mono',monospace;font-size:11px;color:#8BAFD4;letter-spacing:0.3px}
.hdr-right{display:flex;align-items:center;gap:20px;padding:18px 0}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-bar{width:180px;height:6px;background:rgba(255,255,255,0.15);border-radius:999px;overflow:hidden}
.prog-fill{height:100%;background:var(--gold);border-radius:999px;transition:width .4s ease}
.prog-lbl{font-family:'DM Mono',monospace;font-size:12px;color:#fff;font-weight:500;white-space:nowrap}
.stat-pills{display:flex;gap:8px}
.pill{padding:4px 12px;border-radius:999px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px}
.pill-total{background:rgba(255,255,255,0.1);color:#fff}
.pill-done{background:rgba(244,163,0,0.2);color:var(--gold)}
.pill-left{background:rgba(255,255,255,0.07);color:#8BAFD4}

/* ── LAYOUT ── */
.main{max-width:1140px;margin:0 auto;padding:28px 24px 80px}

/* ── TABS ── */
.tabs-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.tab{padding:8px 16px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;background:var(--card);color:var(--muted);transition:all .18s;white-space:nowrap}
.tab:hover{border-color:#aaa;color:var(--text)}
.tab.t-build{border-color:var(--blue);color:var(--blue)}
.tab.t-build.active,.tab.t-build:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab.t-sec{border-color:var(--red);color:var(--red)}
.tab.t-sec.active,.tab.t-sec:hover{background:var(--red);color:#fff}
.tab.t-mkt{border-color:var(--green);color:var(--green)}
.tab.t-mkt.active,.tab.t-mkt:hover{background:var(--green);color:#fff}
.tab.t-reg{border-color:var(--purple);color:var(--purple)}
.tab.t-reg.active,.tab.t-reg:hover{background:var(--purple);color:#fff}
.tab.t-post{border-color:var(--amber);color:var(--amber)}
.tab.t-post.active,.tab.t-post:hover{background:var(--amber);color:#fff}
.tab.t-dep{border-color:var(--muted);color:var(--muted)}
.tab.t-dep.active,.tab.t-dep:hover{background:var(--muted);color:#fff}

/* ── FILTER ROW ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.filter-lbl{font-size:11px;font-weight:600;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.fchip{padding:4px 12px;border-radius:999px;border:1.5px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:all .15s}
.fchip:hover{border-color:var(--blue);color:var(--blue)}
.fchip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.reset-btn{margin-left:auto;padding:5px 14px;border-radius:6px;border:1.5px solid var(--red);color:var(--red);font-size:11px;font-weight:600;cursor:pointer;background:#fff;font-family:'DM Mono',monospace}
.reset-btn:hover{background:var(--red-lt)}

/* ── PHASE PANEL ── */
.panel{display:none}
.panel.active{display:block}

/* ── PHASE NOTE ── */
.phase-note{padding:10px 16px;border-radius:8px;font-size:12px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.pn-blue{background:var(--blue-lt);border-left:4px solid var(--blue);color:var(--blue-dk)}
.pn-red{background:var(--red-lt);border-left:4px solid var(--red);color:var(--red)}
.pn-green{background:var(--green-lt);border-left:4px solid var(--green);color:var(--green)}
.pn-purple{background:var(--purple-lt);border-left:4px solid var(--purple);color:var(--purple)}
.pn-amber{background:var(--amber-lt);border-left:4px solid var(--amber);color:var(--amber)}

/* ── MONTH CARD ── */
.month-card{background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:18px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.mhdr{padding:13px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;gap:12px}
.mhdr.c-blue{background:var(--blue)}
.mhdr.c-red{background:var(--red)}
.mhdr.c-green{background:var(--green)}
.mhdr.c-purple{background:var(--purple)}
.mhdr.c-amber{background:var(--amber)}
.mhdr-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}
.mhdr-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px}
.mhdr-right{display:flex;align-items:center;gap:10px}
.mprog{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-weight:600}
.mtoggle{color:#fff;font-size:16px;transition:transform .22s}
.mhdr.collapsed .mtoggle{transform:rotate(-90deg)}

/* ── WEEK SECTION ── */
.week-sec{border-bottom:1px solid #F0F4F8}
.week-sec:last-child{border-bottom:none}
.whdr{padding:9px 20px;display:flex;align-items:center;gap:8px}
.whdr.wc-blue{background:#EAF1FB}
.whdr.wc-red{background:#FDF0F0}
.whdr.wc-green{background:#F0FAF4}
.whdr.wc-purple{background:#F5EEF8}
.whdr.wc-amber{background:var(--amber-lt)}
.wlabel{font-family:'Syne',sans-serif;font-size:12px;font-weight:700}
.wc-blue .wlabel{color:var(--blue)}
.wc-red .wlabel{color:var(--red)}
.wc-green .wlabel{color:var(--green)}
.wc-purple .wlabel{color:var(--purple)}
.wc-amber .wlabel{color:var(--amber)}
.wdates{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.wfocus{font-size:11px;color:var(--muted);font-style:italic;margin-left:auto}

/* ── TASK ITEM ── */
.task-list{padding:2px 0}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:10px 20px;border-bottom:1px solid #F8FAFB;transition:background .12s}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:#FAFBFF}
.task-item.done{opacity:.5}
.task-item.done .tname{text-decoration:line-through;color:var(--muted)}
.chk{width:17px;height:17px;border-radius:4px;border:2px solid;flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
.chk.c-blue{border-color:var(--blue)}
.chk.c-blue.on{background:var(--blue);border-color:var(--blue)}
.chk.c-red{border-color:var(--red)}
.chk.c-red.on{background:var(--red);border-color:var(--red)}
.chk.c-green{border-color:var(--green)}
.chk.c-green.on{background:var(--green);border-color:var(--green)}
.chk.c-purple{border-color:var(--purple)}
.chk.c-purple.on{background:var(--purple);border-color:var(--purple)}
.chk.c-amber{border-color:var(--amber)}
.chk.c-amber.on{background:var(--amber);border-color:var(--amber)}
.chk.on::after{content:'✓';color:#fff;font-size:10px;font-weight:800;line-height:1}
.tcontent{flex:1;min-width:0}
.tname{font-size:13px;font-weight:500;color:var(--text);line-height:1.45}
.tmeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;font-family:'DM Mono',monospace}
.tag-dev-blue{background:var(--blue-lt);color:var(--blue)}
.tag-dev-red{background:var(--red-lt);color:var(--red)}
.tag-dev-green{background:var(--green-lt);color:var(--green)}
.tag-dev-purple{background:var(--purple-lt);color:var(--purple)}
.tag-dev-amber{background:var(--amber-lt);color:var(--amber)}
.tag-branch{background:#F0FAF4;color:#1A7A4A;font-size:9.5px}
.tag-dep{background:var(--gold-lt);color:#7A5500}

/* ── DEP MAP ── */
.dep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.dep-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;border-left:4px solid var(--blue)}
.dep-card .dmod{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.dep-card .dneeds{font-size:11px;color:var(--muted);margin-top:4px}
.dep-card .dneeds strong{color:var(--red)}
.dep-card .dwhy{font-size:11px;color:#888;margin-top:3px}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .hdr{padding:0 16px}
  .main{padding:16px 12px 60px}
  .prog-bar{width:110px}
  .wfocus,.stat-pills{display:none}
  .tabs-wrap{gap:4px}
  .tab{font-size:11px;padding:6px 10px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <h1>SNAFRATE — Full Build Checklist</h1>
    <div class="hdr-sub">Mar 16, 2026 → Mar 2027 &nbsp;·&nbsp; Frank (Lead + FE1 + Security) · FE2 · BE1 · BE2 · BE3 · Mobile</div>
  </div>
  <div class="hdr-right">
    <div class="stat-pills">
      <div class="pill pill-total">Total <span id="sTotal">0</span></div>
      <div class="pill pill-done">Done <span id="sDone">0</span></div>
      <div class="pill pill-left">Left <span id="sLeft">0</span></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar"><div class="prog-fill" id="gBar" style="width:0%"></div></div>
      <span class="prog-lbl" id="gLbl">0 / 0</span>
    </div>
  </div>
</header>

<main class="main">

  <div class="tabs-wrap">
    <button class="tab t-build active" onclick="showTab(0,this)">① Mar 16–31</button>
    <button class="tab t-build"        onclick="showTab(1,this)">② Apr–May</button>
    <button class="tab t-build"        onclick="showTab(2,this)">③ Jun–Jul</button>
    <button class="tab t-sec"          onclick="showTab(3,this)">🔒 Security</button>
    <button class="tab t-build"        onclick="showTab(4,this)">④ Aug–Sep Launch</button>
    <button class="tab t-mkt"          onclick="showTab(5,this)">📣 Marketing</button>
    <button class="tab t-reg"          onclick="showTab(6,this)">📋 Registration</button>
    <button class="tab t-post"         onclick="showTab(7,this)">🚀 Post-Launch</button>
    <button class="tab t-dep"          onclick="showTab(8,this)">📦 Dep Map</button>
  </div>

  <div class="filter-row" id="filterRow">
    <span class="filter-lbl">Filter:</span>
    <button class="fchip active" onclick="setFilter('all',this)">All</button>
    <button class="fchip" onclick="setFilter('Frank',this)">Frank</button>
    <button class="fchip" onclick="setFilter('BE1',this)">BE1</button>
    <button class="fchip" onclick="setFilter('BE2',this)">BE2</button>
    <button class="fchip" onclick="setFilter('BE3',this)">BE3</button>
    <button class="fchip" onclick="setFilter('FE2',this)">FE2</button>
    <button class="fchip" onclick="setFilter('Mobile',this)">Mobile</button>
    <button class="fchip" onclick="setFilter('All',this)">All Devs</button>
    <button class="reset-btn" onclick="resetAll()">↺ Reset All</button>
  </div>

  <div id="panels"></div>
</main>

        {dev:"Mobile",name:"Full Android QA — test all flows on Pixel 6, Samsung Galaxy A series, and low-end device (2GB RAM). Fix all critical bugs.",branch:"—",dep:"All screens built"},
        {dev:"Mobile",name:"Loyalty points screen, affiliate dashboard screen, promoted listings visible in feed",branch:"android/post-launch-features",dep:"loyalty + affiliate APIs"},
        {dev:"Mobile",name:"Play Store listing — app icon, screenshots (6+ required), feature graphic, store description, content rating questionnaire",branch:"—",dep:"QA pass"},
        {dev:"Mobile",name:"Submit to Google Play Store internal testing track. Fix any policy violations.",branch:"—",dep:"Play Store listing ready"},
        {dev:"Frank",name:"Review and approve Android app internal build before Play Store submission",branch:"—",dep:"android QA pass"},
        {dev:"Mobile",name:"Promote to production track on Google Play Store. Monitor crash rate and ANR rate for 48 hours post-publish.",branch:"—",dep:"Internal testing approved"},
      ]},
    ]},
  ]},

]; // end DATA

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let states = {};
try { states = JSON.parse(localStorage.getItem('snafrate_v4') || '{}'); } catch(e){}

let currentFilter = 'all';

const COLOR_MAP = {
  blue: {mhdr:'c-blue', whdr:'wc-blue', chk:'c-blue', tag:'tag-dev-blue'},
  red:  {mhdr:'c-red',  whdr:'wc-red',  chk:'c-red',  tag:'tag-dev-red'},
  green:{mhdr:'c-green',whdr:'wc-green',chk:'c-green',tag:'tag-dev-green'},
  purple:{mhdr:'c-purple',whdr:'wc-purple',chk:'c-purple',tag:'tag-dev-purple'},
  amber:{mhdr:'c-amber',whdr:'wc-amber',chk:'c-amber',tag:'tag-dev-amber'},
};

function tid(pI,mI,wI,tI){ return `${pI}-${mI}-${wI}-${tI}`; }

function save(){
  try{ localStorage.setItem('snafrate_v4', JSON.stringify(states)); }catch(e){}
  updateStats();
}

function resetAll(){
  if(!confirm('Reset all checkboxes? This cannot be undone.')) return;
  states = {};
  save();
  document.querySelectorAll('.chk').forEach(el=>{
    el.classList.remove('on');
    el.closest('.task-item').classList.remove('done');
  });
}

function toggle(id, chk){
  const item = chk.closest('.task-item');
  if(states[id]){ delete states[id]; chk.classList.remove('on'); item.classList.remove('done'); }
  else{ states[id]=1; chk.classList.add('on'); item.classList.add('done'); }
  save();
  updateMonthProg();
}

function setFilter(dev, e){
  currentFilter = dev;
  document.querySelectorAll('.fchip').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  document.querySelectorAll('.task-item').forEach(item=>{
    const d = item.dataset.dev || '';
    item.style.display = (dev==='all' || d.includes(dev)) ? '' : 'none';
  });
}

function showTab(i, btn){
  document.querySelectorAll('.panel').forEach((p,j)=>p.classList.toggle('active',j===i));
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.getElementById('filterRow').style.display = i===8 ? 'none' : '';
}

function updateMonthProg(){
  document.querySelectorAll('.month-card').forEach(card=>{
    const all = card.querySelectorAll('.chk');
    const done = card.querySelectorAll('.chk.on').length;
    const pct = all.length ? Math.round(done/all.length*100) : 0;
    const el = card.querySelector('.mprog');
    if(el) el.textContent = `${done}/${all.length} (${pct}%)`;
  });
}

function updateStats(){
  const all = document.querySelectorAll('.chk');
  const done = document.querySelectorAll('.chk.on').length;
  const total = all.length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sDone').textContent = done;
  document.getElementById('sLeft').textContent = total - done;
  document.getElementById('gBar').style.width = pct+'%';
  document.getElementById('gLbl').textContent = `${done} / ${total}`;
  updateMonthProg();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render(){
  const container = document.getElementById('panels');

  D.forEach((phase, pI) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (pI===0 ? ' active' : '');

    if(phase.note){
      const note = document.createElement('div');
      note.className = `phase-note ${phase.note.style}`;
      note.textContent = phase.note.text;
      panel.appendChild(note);
    }

    const cm = COLOR_MAP[phase.color] || COLOR_MAP.blue;

    phase.months.forEach((month, mI) => {
      const card = document.createElement('div');
      card.className = 'month-card';

      const hdr = document.createElement('div');
      hdr.className = `mhdr ${cm.mhdr}`;
      hdr.innerHTML = `<div><div class="mhdr-title">${month.name}</div><div class="mhdr-sub">${phase.title}</div></div><div class="mhdr-right"><span class="mprog">—</span><span class="mtoggle">▾</span></div>`;

      const body = document.createElement('div');
      body.className = 'mbody';

      hdr.addEventListener('click', ()=>{
        hdr.classList.toggle('collapsed');
        body.style.display = hdr.classList.contains('collapsed') ? 'none' : '';
      });

      card.appendChild(hdr);

      month.weeks.forEach((week, wI) => {
        const wc = COLOR_MAP[week.color || phase.color] || cm;

        const ws = document.createElement('div');
        ws.className = 'week-sec';

        const wh = document.createElement('div');
        wh.className = `whdr ${wc.whdr}`;
        wh.innerHTML = `<span class="wlabel">${week.label}</span><span class="wdates">${week.dates}</span><span class="wfocus">${week.focus}</span>`;
        ws.appendChild(wh);

        const tl = document.createElement('div');
        tl.className = 'task-list';

        week.tasks.forEach((task, tI) => {
          const id = tid(pI, mI, wI, tI);
          const isDone = !!states[id];

          const item = document.createElement('div');
          item.className = 'task-item' + (isDone ? ' done' : '');
          item.dataset.dev = task.dev;

          const chk = document.createElement('div');
          chk.className = `chk ${wc.chk}` + (isDone ? ' on' : '');
          chk.addEventListener('click', ()=> toggle(id, chk));

          const content = document.createElement('div');
          content.className = 'tcontent';

          const name = document.createElement('div');
          name.className = 'tname';
          name.textContent = task.name;

          const meta = document.createElement('div');
          meta.className = 'tmeta';

          const devTag = `<span class="tag ${wc.tag}">${task.dev}</span>`;
          const branchTag = (task.branch && task.branch !== '—') ? `<span class="tag tag-branch">⌥ ${task.branch}</span>` : '';
          const depTag = (task.dep && task.dep !== '—') ? `<span class="tag tag-dep">⚡ ${task.dep.length > 60 ? task.dep.slice(0,60)+'…' : task.dep}</span>` : '';
          meta.innerHTML = devTag + branchTag + depTag;

          content.appendChild(name);
          content.appendChild(meta);
          item.appendChild(chk);
          item.appendChild(content);
          tl.appendChild(item);
        });

        ws.appendChild(tl);
        body.appendChild(ws);
      });

      card.appendChild(body);
      panel.appendChild(card);
    });

    container.appendChild(panel);
  });

  // ── DEP MAP ──
  const DEP_MAP = [
    {mod:"DB Schema + Migrations",needs:"Nothing",why:"Absolute starting point — all backend work depends on this"},
    {mod:"CSS tokens + Inter font",needs:"Nothing",why:"FE devs cannot style anything until tokens exist"},
    {mod:"Rate Limiting Middleware",needs:"PHP Router",why:"Must exist before any auth endpoint is exposed"},
    {mod:"Auth — Register + Login",needs:"DB Schema",why:"Every module touching a user requires Auth first"},
    {mod:"Role Middleware",needs:"Auth",why:"No protected route can be built before middleware"},
    {mod:"Supplier Onboarding",needs:"Auth, Role Middleware",why:"Suppliers are users — Auth must work first"},
    {mod:"Product CRUD",needs:"Supplier Onboarding, DB Schema",why:"Products belong to approved suppliers"},
    {mod:"Product Listing (Customer)",needs:"Product CRUD, Categories",why:"Cannot display products until suppliers can create them"},
    {mod:"SEO Meta + Sitemap",needs:"Product Detail Page",why:"SEO tags need product data to be populated"},
    {mod:"Customs Duty Calc",needs:"Import Request Confirm",why:"Landed cost calculated when customer confirms quote"},
    {mod:"DHL / AfterShip Logistics",needs:"Order Placement",why:"Labels and tracking generated after order is placed"},
    {mod:"Cart System",needs:"Product Listing, Auth",why:"Cart items are products — user must be authenticated"},
    {mod:"Order Placement",needs:"Cart, Wallet",why:"Order triggers escrow hold which requires wallet balance"},
    {mod:"Wallet + Paystack/Stripe",needs:"Auth, wallets table in DB",why:"Wallet must exist before any order can be confirmed"},
    {mod:"Wise Payout (China suppliers)",needs:"Escrow, Supplier Approval",why:"Payout triggered after escrow releases on delivery confirm"},
    {mod:"Stripe Float Replenishment",needs:"Wise Payout",why:"Replenishes Wise balance that backs supplier payouts"},
    {mod:"Escrow System",needs:"Wallet, Order Placement",why:"Escrow holds wallet funds linked to a specific order"},
    {mod:"Chat — General",needs:"Auth, Supplier Onboarding",why:"Both buyer and supplier must exist as users"},
    {mod:"Chat — Order-Linked",needs:"Chat General, Orders",why:"Extension of the general chat system"},
    {mod:"Abandoned Cart Email",needs:"Cart, SMTP",why:"Needs cart data to exist + mailer to send"},
    {mod:"Referral System",needs:"Auth, Wallet, Orders",why:"Rewards credited to wallet on first completed order"},
    {mod:"Shorts Upload",needs:"Supplier Onboarding, Product CRUD",why:"Shorts link to products and belong to suppliers"},
    {mod:"Shorts Feed",needs:"Shorts Upload, Follow System",why:"Cannot display shorts before suppliers create them"},
    {mod:"Trust Score Engine",needs:"Orders, Chat Rating, Disputes, Shorts",why:"Score draws from multiple completed modules"},
    {mod:"Capital Loop Engine",needs:"Trust Score, Shorts, Order completion",why:"Credits earned from performance across features"},
    {mod:"Supplier Analytics",needs:"Product views + conversion tracking",why:"Analytics aggregate data from multiple event types"},
    {mod:"Promoted Listings",needs:"Product CRUD, Wallet",why:"Billing deducts from supplier wallet daily"},
    {mod:"Dispute System",needs:"Orders, Escrow, Chat",why:"Disputes raised on orders, linked to escrow holds"},
    {mod:"Admin Panel",needs:"All core modules",why:"Admin manages users, products, orders, content"},
    {mod:"Security Hardening",needs:"All features complete",why:"Cannot audit security until features are fully built"},
    {mod:"Loyalty Points",needs:"Orders, Wallet",why:"Points earned on completed orders, redeemed to wallet"},
    {mod:"Affiliate System",needs:"Auth, Wallet, Orders",why:"Commissions credited to wallet on tracked conversions"},
    {mod:"Android App",needs:"All web APIs stable",why:"Mobile app consumes the same APIs — must be stable first"},
  ];

  const depPanel = document.createElement('div');
  depPanel.className = 'panel';

  const depNote = document.createElement('div');
  depNote.className = 'phase-note pn-blue';
  depNote.textContent = 'Build modules in dependency order. Nothing in column B can start until everything it depends on in column A is merged to dev.';
  depPanel.appendChild(depNote);

  const depMap = document.createElement('div');
  depMap.className = 'dep-map';

  const depH = document.createElement('h3');
  depH.style.cssText = 'font-family:Syne,sans-serif;font-size:15px;font-weight:700;color:#1E56B0;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #1E56B0';
  depH.textContent = '📦 Full Module Dependency Map — Build in This Order';
  depMap.appendChild(depH);

  const grid = document.createElement('div');
  grid.className = 'dep-grid';

  DEP_MAP.forEach(d => {
    const c = document.createElement('div');
    c.className = 'dep-card';
    c.innerHTML = `<div class="dmod">${d.mod}</div><div class="dneeds">Needs: <strong>${d.needs}</strong></div><div class="dwhy">${d.why}</div>`;
    grid.appendChild(c);
  });

  depMap.appendChild(grid);
  depPanel.appendChild(depMap);
  container.appendChild(depPanel);

  updateStats();
}

render();
</script>
</body>
</html>
