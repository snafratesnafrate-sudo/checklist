<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAFRATE — Sprint Checklist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #F0F4F8; color: #111827; min-height: 100vh; }

  /* Header */
  .site-header { background: #1E56B0; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .site-header h1 { color: #fff; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .site-header .sub { color: #BBDDEE; font-size: 13px; margin-top: 2px; }
  .progress-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar { width: 200px; height: 8px; background: rgba(255,255,255,0.25); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: #F4A300; border-radius: 999px; transition: width 0.4s ease; }
  .progress-label { color: #fff; font-size: 13px; font-weight: 600; white-space: nowrap; }

  /* Layout */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px 60px; }

  /* Phase tabs */
  .phase-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .phase-tab { padding: 8px 18px; border-radius: 999px; border: 2px solid #1E56B0; color: #1E56B0; font-size: 13px; font-weight: 600; cursor: pointer; background: #fff; transition: all 0.2s; }
  .phase-tab.active { background: #1E56B0; color: #fff; }
  .phase-tab:hover:not(.active) { background: #EAF1FB; }

  /* Month card */
  .month-card { background: #fff; border-radius: 14px; border: 1px solid #E2E8F0; margin-bottom: 20px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .month-header { background: #1E56B0; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .month-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
  .month-header .meta { color: #BBDDEE; font-size: 12px; margin-top: 2px; }
  .month-header .toggle { color: #fff; font-size: 18px; transition: transform 0.25s; }
  .month-header.collapsed .toggle { transform: rotate(-90deg); }
  .month-progress { color: #F4A300; font-size: 12px; font-weight: 700; margin-left: auto; margin-right: 12px; }

  /* Week section */
  .month-body { padding: 0; }
  .week-section { border-bottom: 1px solid #EEF2F6; }
  .week-section:last-child { border-bottom: none; }
  .week-header { padding: 12px 20px; background: #EAF1FB; display: flex; align-items: center; gap: 10px; }
  .week-label { font-size: 13px; font-weight: 700; color: #1E56B0; }
  .week-dates { font-size: 11px; color: #888; }
  .week-focus { font-size: 12px; color: #555; font-style: italic; margin-left: auto; }

  /* Task item */
  .task-list { padding: 4px 0; }
  .task-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 20px; border-bottom: 1px solid #F5F7FA; transition: background 0.15s; }
  .task-item:last-child { border-bottom: none; }
  .task-item:hover { background: #FAFBFF; }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-name { text-decoration: line-through; color: #888; }

  .task-check { width: 18px; height: 18px; border: 2px solid #1E56B0; border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-check.checked { background: #1E56B0; border-color: #1E56B0; }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

  .task-content { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.4; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; align-items: center; }
  .tag { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .tag-dev { background: #EAF1FB; color: #1E56B0; }
  .tag-branch { background: #F0FAF4; color: #1A7A4A; font-family: monospace; font-size: 10px; }
  .tag-blocks { background: #FDF0F0; color: #C0392B; }
  .tag-dep { background: #FFF8E1; color: #8B4513; }
  .task-dep { font-size: 11px; color: #888; margin-top: 3px; }

  /* Dependency map */
  .dep-map { margin-bottom: 24px; }
  .dep-map h3 { font-size: 14px; font-weight: 700; color: #1E56B0; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #1E56B0; }
  .dep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  .dep-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 10px; padding: 12px 14px; border-left: 4px solid #1E56B0; }
  .dep-card .module { font-size: 13px; font-weight: 700; color: #111; }
  .dep-card .dep-needs { font-size: 11px; color: #888; margin-top: 4px; }
  .dep-card .dep-needs strong { color: #C0392B; }

  /* Stats bar */
  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 10px; padding: 14px 20px; flex: 1; min-width: 140px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 700; color: #1E56B0; line-height: 1; }
  .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

  /* Filter */
  .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: #888; font-weight: 600; }
  .dev-filter { padding: 5px 12px; border-radius: 999px; border: 1.5px solid #ccc; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: #555; transition: all 0.2s; }
  .dev-filter.active { background: #1E56B0; border-color: #1E56B0; color: #fff; }

  /* Hidden */
  .phase-panel { display: none; }
  .phase-panel.active { display: block; }

  .reset-btn { padding: 7px 16px; border-radius: 8px; border: 1.5px solid #C0392B; color: #C0392B; font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; margin-left: auto; }
  .reset-btn:hover { background: #FDF0F0; }

  @media (max-width: 600px) {
    .site-header { padding: 16px; }
    .main { padding: 16px 12px 48px; }
    .progress-bar { width: 120px; }
    .week-focus { display: none; }
  }
</style>
</head>

  </div>

<main class="main">

  </div>

  <div id="phase-panels"></div>
</main>

const DEP_MAP = [

  { mod: "CSS tokens + Inter font setup", needs: "Nothing", why: "FE devs cannot style anything until tokens exist" },
  { mod: "Auth — Register + Login", needs: "DB Schema", why: "Every module that touches a user requires Auth first" },
  { mod: "Role Middleware", needs: "Auth", why: "No protected route can be built before middleware exists" },
  { mod: "Supplier Onboarding", needs: "Auth, Role Middleware", why: "Suppliers are users — Auth must work" },
  { mod: "Product CRUD", needs: "Supplier Onboarding, DB Schema", why: "Products belong to approved suppliers" },
  { mod: "Product Listing (Customer)", needs: "Product CRUD, Categories", why: "Can't display products until suppliers can create them" },
  { mod: "Import Request Form", needs: "Auth, Product Listing", why: "Customer must be logged in; supplier system must exist" },
  { mod: "Cart System", needs: "Product Listing, Auth", why: "Cart items are products; user must be authenticated" },
  { mod: "Order Placement", needs: "Cart, Wallet", why: "Order triggers escrow hold which requires wallet" },
  { mod: "Wallet + Paystack/Stripe", needs: "Auth, DB Schema (wallets table)", why: "Wallet must exist before any order can be confirmed" },
  { mod: "Escrow", needs: "Wallet, Order Placement", why: "Escrow holds wallet funds linked to an order record" },
  { mod: "Chat — General", needs: "Auth, Supplier Onboarding", why: "Both parties must exist as users" },
  { mod: "Chat — Order-Linked", needs: "Chat General, Orders", why: "Order-linked chat is an extension of the chat system" },
  { mod: "Shorts Upload", needs: "Supplier Onboarding, Product CRUD", why: "Shorts link to products and belong to suppliers" },
  { mod: "Shorts Feed", needs: "Shorts Upload", why: "Can't display shorts before suppliers can create them" },

  { mod: "Admin Panel", needs: "All core modules", why: "Admin manages users, products, orders, content — all must exist" },
  { mod: "Dispute System", needs: "Orders, Escrow, Chat", why: "Disputes are raised on orders and linked to escrow holds" },
];

// ── Render ──────────────────────────────────────────────────────
let currentFilter = 'all';
let taskStates = JSON.parse(localStorage.getItem('snafrate_tasks') || '{}');

function taskId(phaseI, monthI, weekI, taskI) {
  return `${phaseI}-${monthI}-${weekI}-${taskI}`;
}

function saveStates() {
  localStorage.setItem('snafrate_tasks', JSON.stringify(taskStates));
  updateStats();
}

function resetAll() {
  if (!confirm('Reset all checkboxes?')) return;
  taskStates = {};
  saveStates();
  document.querySelectorAll('.task-check').forEach(el => {
    el.classList.remove('checked');
    el.closest('.task-item').classList.remove('done');
  });
  updateStats();
}

function toggleTask(id, el) {
  const item = el.closest('.task-item');
  if (taskStates[id]) {
    delete taskStates[id];
    el.classList.remove('checked');
    item.classList.remove('done');
  } else {
    taskStates[id] = true;
    el.classList.add('checked');
    item.classList.add('done');
  }
  saveStates();
  updateMonthProgress();
}

function setFilter(dev) {
  currentFilter = dev;
  document.querySelectorAll('.dev-filter').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.task-item').forEach(item => {
    const d = item.dataset.dev;
    item.style.display = (dev === 'all' || d.includes(dev)) ? '' : 'none';
  });
}

function showPhase(i) {
  document.querySelectorAll('.phase-panel').forEach((p,j) => p.classList.toggle('active', j === i));
  document.querySelectorAll('.phase-tab').forEach((t,j) => t.classList.toggle('active', j === i));
  const filterRow = document.getElementById('filterRow');
  filterRow.style.display = i === 4 ? 'none' : '';
}

function updateMonthProgress() {
  document.querySelectorAll('.month-card').forEach(card => {
    const checks = card.querySelectorAll('.task-check');
    const done = card.querySelectorAll('.task-check.checked').length;
    const pct = checks.length ? Math.round(done / checks.length * 100) : 0;
    const prog = card.querySelector('.month-progress');
    if (prog) prog.textContent = `${done}/${checks.length} (${pct}%)`;
  });
}

function updateStats() {
  const all = document.querySelectorAll('.task-check');
  const done = document.querySelectorAll('.task-check.checked');
  const total = all.length;
  const doneN = done.length;
  const pct = total ? Math.round(doneN / total * 100) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent = doneN;
  document.getElementById('statLeft').textContent = total - doneN;
  document.getElementById('statPct').textContent = pct + '%';
  document.getElementById('globalBar').style.width = pct + '%';
  document.getElementById('globalLabel').textContent = `${doneN} / ${total} done`;
  updateMonthProgress();
}

function renderDepMap() {
  const panel = document.createElement('div');
  panel.className = 'phase-panel';
  const map = document.createElement('div');
  map.className = 'dep-map';
  const h = document.createElement('h3');
  h.textContent = '📦 Module Dependency Map — Build in This Order';
  map.appendChild(h);
  const grid = document.createElement('div');
  grid.className = 'dep-grid';
  DEP_MAP.forEach(d => {
    const card = document.createElement('div');
    card.className = 'dep-card';
    card.innerHTML = `<div class="module">${d.mod}</div>
      <div class="dep-needs">Needs: <strong>${d.needs}</strong></div>
      <div class="dep-needs" style="margin-top:4px;color:#666">${d.why}</div>`;
    grid.appendChild(card);
  });
  map.appendChild(grid);
  panel.appendChild(map);
  return panel;
}

function render() {
  const container = document.getElementById('phase-panels');
  container.innerHTML = '';

  PHASES.forEach((phase, phaseI) => {
    const panel = document.createElement('div');
    panel.className = 'phase-panel' + (phaseI === 0 ? ' active' : '');

    phase.months.forEach((month, monthI) => {
      const card = document.createElement('div');
      card.className = 'month-card';

      const hdr = document.createElement('div');
      hdr.className = 'month-header';
      hdr.innerHTML = `
        <div>
          <h2>${month.name} ${month.trial ? '— ' + month.trial : ''}</h2>
          <div class="meta">${phase.theme}</div>
        </div>
        <span class="month-progress">—</span>
        <span class="toggle">▾</span>`;
      hdr.addEventListener('click', () => {
        hdr.classList.toggle('collapsed');
        body.style.display = hdr.classList.contains('collapsed') ? 'none' : '';
      });
      card.appendChild(hdr);

      const body = document.createElement('div');
      body.className = 'month-body';

      month.weeks.forEach((week, weekI) => {
        const ws = document.createElement('div');
        ws.className = 'week-section';

        const wh = document.createElement('div');
        wh.className = 'week-header';
        wh.innerHTML = `<span class="week-label">${week.label}</span><span class="week-dates">${week.dates}</span><span class="week-focus">${week.focus}</span>`;
        ws.appendChild(wh);

        const tl = document.createElement('div');
        tl.className = 'task-list';

        week.tasks.forEach((task, taskI) => {
          const id = taskId(phaseI, monthI, weekI, taskI);
          const done = !!taskStates[id];
          const item = document.createElement('div');
          item.className = 'task-item' + (done ? ' done' : '');
          item.dataset.dev = task.dev;

          const check = document.createElement('div');
          check.className = 'task-check' + (done ? ' checked' : '');
          check.addEventListener('click', () => toggleTask(id, check));

          const content = document.createElement('div');
          content.className = 'task-content';

          const name = document.createElement('div');
          name.className = 'task-name';
          name.textContent = task.name;

          const meta = document.createElement('div');
          meta.className = 'task-meta';
          meta.innerHTML = `<span class="tag tag-dev">${task.dev}</span>` +
            (task.branch !== '—' ? `<span class="tag tag-branch">⎇ ${task.branch}</span>` : '') +
            (task.dep && task.dep !== 'Nothing' ? `<span class="tag tag-dep">⚡ Needs: ${task.dep.length > 50 ? task.dep.slice(0,50)+'…' : task.dep}</span>` : '');

          content.appendChild(name);
          content.appendChild(meta);
          item.appendChild(check);
          item.appendChild(content);
          tl.appendChild(item);
        });

        ws.appendChild(tl);
        body.appendChild(ws);
      });

      card.appendChild(body);
      panel.appendChild(card);
    });

    container.appendChild(panel);
  });

  container.appendChild(renderDepMap());
  updateStats();
}

render();
</script>
